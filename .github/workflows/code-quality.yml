name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run Build
        run: npm run build

      - name: Run ESLint
        run: npm run lint

      - name: Run Format Check
        run: npx prettier --check .

      - name: Run Vulnerability Test (Audit)
        run: npm audit
