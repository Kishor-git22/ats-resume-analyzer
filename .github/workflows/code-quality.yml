name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create package-lock.json at runtime
        run: |
          rm -f package-lock.json
          echo "Generating package-lock.json at runtime..."
          npm install --package-lock-only --ignore-scripts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ ! -f package-lock.json ]; then
            echo "package-lock.json not found. Generating at runtime..."
            npm install --package-lock-only --ignore-scripts
          fi
          npm ci

      - name: Verify lockfile and install
        run: |
          test -f package-lock.json
          npm ls --depth=0

      - name: Run Build
        run: npm run build

      - name: Run ESLint
        run: npm run lint

      - name: Run Format Check
        run: npx prettier --check .

      - name: Run Vulnerability Test (Audit)
        run: npm audit
