name: Node.js CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    services:
      mongo: # MongoDB service container
        image: mongo:6.0 # Pull official MongoDB 6.0 image
        ports:
          - 27017:27017 # Expose default MongoDB port
        options: >- # Health checks ensure MongoDB is ready before tests
          --health-cmd="mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # Install all project dependencies from package-lock.json
      - name: Install project dependencies
        run: npm install

      # Run ESLint
      - name: Run ESLint
        run: npm run lint

      # Run Prettier Check
      - name: Run Prettier
        run: npx prettier --check .

      # Run build
      - name: Run build
        run: npm run build
